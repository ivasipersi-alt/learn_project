{% extends "base.html" %}

{% block content %}
    <div class="flex-between" style="margin-bottom: 20px;">
        <h2>✨ Новый курс</h2>
        <a href="/" class="link-back">← Назад к списку</a>
    </div>

    <form method="post">
        <div class="form-group">
            <label>Название курса</label>
            <input type="text" name="title" class="form-control" required minlength="2">
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Стоимость (₽)</label>
                <input type="number" step="0.01" name="price" class="form-control" required min="0">
            </div>
            <div class="form-group">
                <label>Длительность (месяцев)</label>
                <input type="number" name="duration_months" class="form-control" required min="1">
            </div>
        </div>

        <div class="form-group">
            <label>Имя преподавателя</label>
            <input type="text" name="instructor" class="form-control" required minlength="2">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Сохранить</button>
            <a href="/" class="btn btn-cancel">Отмена</a>
        </div>
    </form>
{% endblock %}
