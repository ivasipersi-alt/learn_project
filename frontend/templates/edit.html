{% extends "base.html" %}

{% block content %}
    <div class="flex-between" style="margin-bottom: 25px;">
        <h2 style="margin: 0;">Редактирование курса</h2>
        <a href="/" class="btn btn-secondary">Отмена</a>
    </div>

    <form action="/edit/{{ course.id }}" method="post">
        <div class="form-group">
            <label>Название учебной программы</label>
            <input type="text" name="title" class="form-control" value="{{ course.title }}" required>
        </div>

        <div class="form-group">
            <label>Подробное описание</label>
            <textarea name="description" class="form-control" rows="3">{{ course.description }}</textarea>
        </div>

        <div class="form-group" style="margin-bottom: 15px; padding: 10px; background-color: rgba(0,0,0,0.03); border-radius: 8px;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin: 0;">
                <input type="checkbox" name="is_free" id="is_free_checkbox" onchange="togglePrice()" style="width: 20px; height: 20px;" {% if course.price == 0 %}checked{% endif %}>
                <strong style="color: var(--success);">Сделать курс бесплатным</strong>
            </label>
        </div>

        <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="form-group" id="price_group">
                <label>Стоимость (₽)</label>
                <input type="number" step="0.01" name="price" id="price_input" class="form-control" value="{{ course.price }}" required min="0">
            </div>
            <div class="form-group" id="discount_group">
                <label>Скидка (%)</label>
                <input type="number" name="discount_percent" class="form-control" value="{{ course.discount_percent }}" min="0" max="100">
            </div>

            <div class="form-group">
                <label>Срок (мес.)</label>
                <input type="number" name="duration_months" class="form-control" value="{{ course.duration_months }}" required min="1">
            </div>
        </div>

        <div class="form-group">
            <label>Преподаватель</label>
            <input type="text" name="instructor" class="form-control" value="{{ course.instructor }}" required>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <button type="submit" class="btn btn-primary">Обновить данные курса</button>
        </div>
    </form>

    <script>
        function togglePrice() {
            const isFree = document.getElementById('is_free_checkbox').checked;
            const priceGroup = document.getElementById('price_group');
            const discountGroup = document.getElementById('discount_group');
            const priceInput = document.getElementById('price_input');

            if (isFree) {
                priceGroup.style.display = 'none';
                discountGroup.style.display = 'none';
                priceInput.removeAttribute('required');
            } else {
                priceGroup.style.display = 'block';
                discountGroup.style.display = 'block';
                priceInput.setAttribute('required', 'required');
            }
        }

        window.onload = togglePrice;
    </script>
{% endblock %}
